spring.datasource.url=jdbc:postgresql://postgres:5432/volunteer_db
spring.datasource.username=volunteer_user
spring.datasource.password=volunteer_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

jwt.secret=mySuperSecretKey_1234567890123456789012345678901234567890
jwt.expiration=3600000

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false